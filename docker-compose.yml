version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: api_test_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-apitest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apitest1234}
      POSTGRES_DB: ${POSTGRES_DB:-api_collect}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apitest} -d ${POSTGRES_DB:-api_collect}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
